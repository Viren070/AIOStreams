name: Build and Deploy Docker Images

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git Ref
        required: true
        type: string

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tags: ${{ steps.tags.outputs.tags }}
      channel: ${{ steps.tags.outputs.channel }}
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate tags
        id: tags
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          declare TAGS=""
          case "${INPUT_REF}" in
          v[0-9]*.[0-9]*.[0-9]*)
            TAGS="${INPUT_REF}"
            if [[ "$(git rev-parse origin/main)" = "$(git rev-parse "${INPUT_REF}")" ]]; then
              MAJOR_MINOR=$(echo "${INPUT_REF}" | sed -E 's/v([0-9]+)\.([0-9]+)\.[0-9]+/\1.\2/')
              MAJOR=$(echo "${INPUT_REF}" | sed -E 's/v([0-9]+)\.[0-9]+\.[0-9]+/\1/')
              TAGS="${TAGS} latest v${MAJOR_MINOR} v${MAJOR}"
            fi
            CHANNEL="stable"
            ;;
          [0-9]*.[0-9]*.[0-9]*-nightly)
            TAGS="${INPUT_REF} nightly"
            CHANNEL="nightly"
            ;;
          *)
            echo "Invalid Input Ref: ${INPUT_REF}"
            exit 1
            ;;
          esac

          if [[ -z "${TAGS}" ]]; then
            echo "Empty Tags!"
            exit 1
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT

      - name: Calculate image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

  build:
    name: build (${{ matrix.suffix }})
    needs: setup
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate metadata
        run: node scripts/generateMetadata.cjs --channel=${{ needs.setup.outputs.channel }}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ matrix.platform }}
          push: true
          context: .
          file: ./Dockerfile
          outputs: type=image,name=${{ needs.setup.outputs.image }},push-by-digest=true,name-canonical=true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

      - name: Export digest
        run: echo "${{ steps.build.outputs.digest }}" > "/tmp/${{ matrix.suffix }}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          path: /tmp/${{ matrix.suffix }}
          archive: false
          retention-days: 1

  merge:
    name: Merge manifests
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: '{amd64,arm64}'
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push manifests
        env:
          TAGS: ${{ needs.setup.outputs.tags }}
          IMAGE: ${{ needs.setup.outputs.image }}
        run: |
          for tag in ${TAGS}; do
            docker buildx imagetools create \
              -t "${IMAGE}:${tag}" \
              "${IMAGE}@$(cat /tmp/digests/amd64)" \
              "${IMAGE}@$(cat /tmp/digests/arm64)"
          done

